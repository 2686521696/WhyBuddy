<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SlideRule - 最小验证页</title>
  <style>
    :root { --line:#e2e8f0; --ink:#1e293b; --muted:#64748b; --ok:#10b981; --bad:#f59e0b; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: #f8fafc;
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    header h1 { margin: 0; font-size: 16px; }
    header .tag {
      border-radius: 999px;
      background: #f1f5f9;
      padding: 2px 8px;
      color: var(--muted);
      font-size: 11px;
    }
    main { max-width: 960px; margin: 0 auto; padding: 24px; }
    .row { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      border: 0;
      border-radius: 10px;
      background: #0f172a;
      padding: 10px 18px;
      color: #fff;
      font-weight: 600;
    }
    button:disabled { cursor: not-allowed; opacity: .45; }
    .examples { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .examples button {
      border: 1px solid var(--line);
      background: #fff;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }
    .status { min-height: 18px; margin-bottom: 12px; color: var(--muted); font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      opacity: .5;
      transition: .2s;
    }
    .card.on { border-color: var(--ok); background: #ecfdf5; opacity: 1; }
    .card.run { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 0 0 2px #bfdbfe; opacity: 1; }
    .card .name { font-size: 13px; font-weight: 600; }
    .card .st { margin-top: 4px; color: var(--muted); font-size: 11px; }
    .summary { margin-bottom: 16px; border-radius: 10px; padding: 10px 14px; font-weight: 600; }
    .summary.ok { background: #ecfdf5; color: #047857; }
    .summary.bad { background: #fffbeb; color: #b45309; }
    .events {
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .events .ev {
      border-bottom: 1px solid #f1f5f9;
      padding: 6px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .events .ev:last-child { border-bottom: 0; }
    .ev .t { color: #3b82f6; }
    .ev .t.res { color: #10b981; }
    .ev .t.done { color: #0f172a; font-weight: 700; }
    h2 {
      margin: 20px 0 8px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    pre {
      max-height: 200px;
      overflow: auto;
      border-radius: 10px;
      background: #0f172a;
      padding: 12px;
      color: #cbd5e1;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <header>
    <h1>SlideRule</h1>
    <span class="tag">最小验证页 · 直连 Python 9700</span>
    <span class="tag" id="modeTag">SSE stream</span>
  </header>
  <main>
    <div class="row">
      <input type="text" id="intent" placeholder="输入应用意图，例如：采购审批应用..." />
      <button id="run">推演</button>
    </div>
    <div class="examples" id="examples"></div>
    <div class="status" id="status"></div>

    <div class="summary" id="summary" style="display:none"></div>
    <div class="grid" id="skills"></div>

    <h2>SSE 事件流</h2>
    <div class="events" id="events"></div>

    <h2>skillRuntimeGraph 边</h2>
    <pre id="graph">（推演后显示）</pre>
  </main>

  <script>
    const SKILLS = ["datamodel", "rbac", "workflow", "page", "aigc", "appbundle"];
    const SKILL_LABEL = {
      datamodel: "DataModel",
      rbac: "RBAC",
      workflow: "Workflow",
      page: "Page",
      aigc: "AIGC",
      appbundle: "AppBundle",
    };
    const CAMEL2LOWER = {
      dataModel: "datamodel",
      rbac: "rbac",
      workflow: "workflow",
      page: "page",
      aigc: "aigc",
      appBundle: "appbundle",
    };
    const EXAMPLES = [
      "采购审批应用：采购单、经理审批、财务确认、字段权限",
      "请假审批系统：请假单、部门审批、HR 备案",
      "客户服务工单平台：工单创建、分派、升级、SLA 闭环",
    ];

    const $ = (id) => document.getElementById(id);

    function renderSkillCards(activeLower, closure) {
      const pse = (closure && closure.perSkillEvidence) || {};
      $("skills").innerHTML = SKILLS.map((key) => {
        const ev = pse[key];
        const present = ev && ev.evidencePresent === true;
        const cls = key === activeLower ? "card run" : (present ? "card on" : "card");
        const st = key === activeLower ? "运行中..." : (present ? "evidence OK" : "pending");
        return `<div class="${cls}"><div class="name">${SKILL_LABEL[key]}</div><div class="st">${st}</div></div>`;
      }).join("");
    }

    function pushEvent(type, text) {
      const cls = type === "skill_result" ? "res" : (type === "complete" ? "done" : "");
      const div = document.createElement("div");
      div.className = "ev";
      div.innerHTML = `<span class="t ${cls}">${type}</span> ${text || ""}`;
      $("events").appendChild(div);
      $("events").scrollTop = $("events").scrollHeight;
    }

    async function createSession(intent) {
      const created = await fetch("/api/sliderule/sessions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ goal: { text: intent } }),
      });
      if (!created.ok) throw new Error("create failed " + created.status);
      const body = await created.json();
      const loaded = await fetch("/api/sliderule/sessions/" + encodeURIComponent(body.sessionId));
      return (await loaded.json()).state;
    }

    async function drive(intent) {
      $("run").disabled = true;
      $("events").innerHTML = "";
      $("summary").style.display = "none";
      $("status").textContent = "创建会话...";
      renderSkillCards(null, null);

      try {
        const state = await createSession(intent);
        $("status").textContent = "推演中（SSE 流式）...";
        const resp = await fetch("/api/sliderule/drive-full-stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state, userText: intent, max_loops: 6 }),
        });
        if (!resp.ok || !resp.body) throw new Error("drive failed " + resp.status);

        const reader = resp.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        let closure = null;
        let active = null;
        const lastMermaidByLower = {};

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split("\n");
          buf = lines.pop() || "";

          for (const line of lines) {
            const s = line.trim();
            if (!s.startsWith("data:")) continue;
            const js = s.slice(5).trim();
            if (!js) continue;

            let evt;
            try { evt = JSON.parse(js); } catch { continue; }

            if (evt.type === "reasoning_step") {
              $("status").textContent = "推理中：" + (evt.label || "") + (evt.loop != null ? ` (loop ${evt.loop})` : "");
              pushEvent("reasoning_step", evt.label || "");
            } else if (evt.type === "reasoning_step_result") {
              pushEvent("reasoning_step_result", (evt.label || "") + (evt.error ? " [error]" : ""));
            } else if (evt.type === "skill_start") {
              active = CAMEL2LOWER[evt.skill] || evt.skill;
              pushEvent("skill_start", `${evt.skill}`);
              renderSkillCards(active, closure);
            } else if (evt.type === "skill_result") {
              const lower = CAMEL2LOWER[evt.skill] || evt.skill;
              if (!closure) closure = { perSkillEvidence: {}, skillCount: 6, evidencePresentCount: 0 };
              if (!closure.perSkillEvidence) closure.perSkillEvidence = {};
              closure.perSkillEvidence[lower] = {
                evidencePresent: evt.evidencePresent === true,
                evidenceRef: evt.evidenceRef,
                artifactId: evt.artifactId,
              };
              if (evt.mermaid) lastMermaidByLower[lower] = evt.mermaid;
              pushEvent("skill_result", `${evt.skill} · present=${evt.evidencePresent} · edges=${(evt.edges || []).length}`);
              renderSkillCards(active, closure);
            } else if (evt.type === "phase_change") {
              pushEvent("phase_change", evt.phase);
            } else if (evt.type === "publish_closure") {
              closure = evt.data;
              pushEvent("publish_closure", "evidence " + (closure.evidencePresentCount || 0) + "/" + (closure.skillCount || 6));
              renderSkillCards(null, closure);
            } else if (evt.type === "complete") {
              pushEvent("complete", "state phase=" + (evt.state && evt.state.runtimePhase));
              if (!closure && evt.state) closure = evt.state.publishClosure;
              if (evt.state && evt.state.skillRuntimeGraph) {
                const edges = evt.state.skillRuntimeGraph.edges || [];
                const mermaids = Object.entries(lastMermaidByLower)
                  .map(([key, mermaid]) => `# ${key}\n${mermaid}`).join("\n\n");
                $("graph").textContent =
                  "== skillRuntimeGraph.edges ==\n" + JSON.stringify(edges, null, 2) +
                  (mermaids ? "\n\n== per-skill mermaid (from skill_result) ==\n" + mermaids : "");
              }
            } else if (evt.type === "error") {
              pushEvent("error", evt.message);
            }
          }
        }

        renderSkillCards(null, closure);
        const blocked = !closure || closure.blocked;
        const n = closure ? closure.evidencePresentCount : 0;
        const total = closure ? closure.skillCount : 6;
        const sm = $("summary");
        sm.style.display = "block";
        sm.className = "summary " + (blocked ? "bad" : "ok");
        sm.textContent = blocked
          ? `发布闭环被阻塞 · 证据 ${n}/${total}（fail-closed：该意图缺少运行时链接证据）`
          : `发布闭环完成 · 证据 ${n}/${total} · digest ${closure.stableDigest || closure.closureHash || ""}`;
        $("status").textContent = "完成";
      } catch (e) {
        $("status").textContent = "错误：" + (e && e.message ? e.message : String(e));
      } finally {
        $("run").disabled = false;
      }
    }

    $("examples").innerHTML = EXAMPLES.map((example, index) => `<button data-i="${index}">${example}</button>`).join("");
    $("examples").addEventListener("click", (event) => {
      if (event.target.dataset.i != null) {
        $("intent").value = EXAMPLES[event.target.dataset.i];
      }
    });
    $("run").addEventListener("click", () => {
      const value = $("intent").value.trim();
      if (value) drive(value);
    });
    $("intent").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        const value = $("intent").value.trim();
        if (value) drive(value);
      }
    });
    renderSkillCards(null, null);
  </script>
</body>
</html>
