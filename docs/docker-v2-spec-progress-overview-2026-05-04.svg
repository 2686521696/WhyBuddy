    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#dbe5ef" stroke-width="1" opacity="0.6"/>
    </pattern>
    <style>
      .title { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #475569; }
      .section { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; font-size: 21px; font-weight: 800; fill: #0f172a; }
      .cardTitle { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #0f172a; }
      .body { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #334155; }
      .small { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #475569; }
      .tiny { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #64748b; }
      .mono { font-family: "Cascadia Mono", "JetBrains Mono", Consolas, monospace; font-size: 12px; font-weight: 650; fill: #475569; }
      .pill { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; font-size: 13px; font-weight: 800; }
      .ok { fill: #166534; }
      .todo { fill: #7e22ce; }
      .muted { fill: #64748b; }
      .linkStrong { fill: none; stroke: #16a34a; stroke-width: 3; marker-end: url(#arrow); }
      .linkNext { fill: none; stroke: #a855f7; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
