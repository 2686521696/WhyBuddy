  <text class="title" x="70" y="78">Docker V2 五份 Spec 执行进度</text>
  <text class="subtitle" x="70" y="112">当前状态：五份 spec 的 MVP 已推进完成，Docker 已升级到 Skill-aware Agent Sandbox + Live Preview；剩余 noVNC 原型评估。</text>

  <rect x="1112" y="56" width="118" height="34" rx="17" fill="#dcfce7" stroke="#86efac"/>
  <text class="pill ok" x="1134" y="78">MVP完成</text>
  <rect x="1246" y="56" width="118" height="34" rx="17" fill="#fae8ff" stroke="#e879f9"/>
