  <text class="mono" x="96" y="532">docker-executor-capabilities-contract</text>
  <text class="body" x="96" y="564">
    <tspan x="96" dy="0">目标：/capabilities、requiredCapabilities、能力不足拒绝</tspan>
    <tspan x="96" dy="24">作用：把命令执行器升级成能力调度器</tspan>
  </text>
