    </g>
    <text class="cardTitle" x="96" y="266">Spec 数量</text>
    <text class="title" x="96" y="322">5</text>
    <text class="small" x="158" y="318">份总规划</text>
    <text class="tiny" x="96" y="350">全部已创建 requirements / design / tasks</text>

    <text class="cardTitle" x="472" y="266">任务总进度</text>
    <text class="title" x="472" y="322">34 / 35</text>
    <text class="small" x="596" y="318">tasks</text>
    <rect x="472" y="342" width="270" height="12" rx="6" fill="#e2e8f0"/>
