  <text class="pill ok" x="616" y="501">P0</text>
  <text class="cardTitle" x="668" y="502">2. AI Agent 强沙箱镜像</text>
  <text class="mono" x="598" y="532">cube-ai-agent-sandbox-image</text>
  <text class="body" x="598" y="564">
    <tspan x="598" dy="0">目标：cube-ai-agent-sandbox 强镜像与自检脚本</tspan>
    <tspan x="598" dy="24">作用：补齐浏览器、文档、媒体、中文字体能力</tspan>
  </text>
