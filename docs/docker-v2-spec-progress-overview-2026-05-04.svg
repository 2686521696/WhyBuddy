    <text class="body" x="848" y="302">剩余：noVNC Xvfb/VNC 原型评估</text>
    <text class="mono" x="848" y="330">docker-live-preview-workstation</text>
    <text class="tiny" x="848" y="360">Live Preview MVP 已接通；noVNC 暂不进入生产实现</text>

    <text class="cardTitle" x="1224" y="266">最新验证</text>
    <text class="body" x="1224" y="302">Live Preview smoke 已通过</text>
    <text class="mono" x="1224" y="330">npm run smoke:agent-executor-browser</text>
    <text class="tiny" x="1224" y="360">截图帧、终端日志、HTML/JSON/PNG 产物与 replay artifacts 已回流</text>
  </g>

  <text class="section" x="70" y="430">执行路线</text>

