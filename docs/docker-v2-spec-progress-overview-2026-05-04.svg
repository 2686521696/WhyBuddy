  <rect x="346" y="866" width="300" height="12" rx="6" fill="#16a34a"/>
  <text class="small" x="660" y="878">7 / 7</text>
  <text class="tiny" x="346" y="896">状态：已完成；两个 seed skills 的 Docker real-mode smoke 已通过</text>

  <rect x="850" y="744" width="54" height="28" rx="14" fill="#fef9c3" stroke="#facc15"/>
  <text class="pill muted" x="868" y="763">P3</text>
  <text class="cardTitle" x="920" y="764">5. Docker Live Preview Workstation</text>
  <text class="mono" x="850" y="794">docker-live-preview-workstation</text>
  <text class="body" x="850" y="826">
