# 档位二：push main（发版）→ GitHub 的 16G 构建机自动构建双镜像 → 推 ghcr.io。
# 服务器从此只拉不建：docker compose -f docker-compose.prod.yml pull && up -d
# （8G 小机在生产机上构建会内存打穿——2026-07-16 实测 26 分钟 + OOM，此为根治）
#
# 镜像地址（公开仓库默认包也公开，服务器无需登录即可拉取；若包被设为私有，
# 服务器先 docker login ghcr.io -u <用户名> -p <PAT>）：
#   ghcr.io/xiaojilele-glitch/whybuddy-app:latest      （及 :<commit-sha> 可回滚）
#   ghcr.io/xiaojilele-glitch/whybuddy-python:latest
name: deploy-images

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            dockerfile: Dockerfile
          - name: python
            dockerfile: slide-rule-python/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr 仓库名必须全小写；github.repository 带大写（WhyBuddy）
      - id: repo
        run: echo "lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lc }}-${{ matrix.name }}:latest
            ghcr.io/${{ steps.repo.outputs.lc }}-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
