# 档位二：push main（发版）→ GitHub 的 16G 构建机自动构建双镜像 → 推 ghcr.io。
# 服务器从此只拉不建：docker compose -f docker-compose.prod.yml pull && up -d
# （8G 小机在生产机上构建会内存打穿——2026-07-16 实测 26 分钟 + OOM，此为根治）
#
# 镜像地址（公开仓库默认包也公开，服务器无需登录即可拉取；若包被设为私有，
# 服务器先 docker login ghcr.io -u <用户名> -p <PAT>）：
#   ghcr.io/xiaojilele-glitch/whybuddy-app:latest      （及 :<commit-sha> 可回滚）
#   ghcr.io/xiaojilele-glitch/whybuddy-python:latest
name: deploy-images

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    # 双推开关：仓库配了 DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets 时，
    # 镜像同时推 Docker Hub（docker.io/<用户名>/whybuddy-*）——国内服务器
    # 走 Docker Hub 加速源拉取，绕开 ghcr 直连超时。没配则只推 ghcr。
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            dockerfile: Dockerfile
          - name: python
            dockerfile: slide-rule-python/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        if: env.DOCKERHUB_USERNAME != ''
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ghcr 仓库名必须全小写；github.repository 带大写（WhyBuddy）。
      # tags 在这里拼：ghcr 恒推，Docker Hub 按 secrets 有无追加。
      - id: meta
        run: |
          LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          TAGS="ghcr.io/${LC}-${{ matrix.name }}:latest
          ghcr.io/${LC}-${{ matrix.name }}:${{ github.sha }}"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            TAGS="${TAGS}
          docker.io/${DOCKERHUB_USERNAME}/whybuddy-${{ matrix.name }}:latest
          docker.io/${DOCKERHUB_USERNAME}/whybuddy-${{ matrix.name }}:${{ github.sha }}"
          fi
          {
            echo "tags<<TAGS_EOF"
            echo "${TAGS}"
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
