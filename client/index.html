<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- B5: CSP for GitHub Pages BYOK browser-llm (connect to LLM vendors only; no proxy). Injected via Vite for build too to avoid html-proxy transform issues. -->
    <!-- CSP meta is dynamically injected by Vite plugin during build (see vite.config.ts) for clean static output. For dev it falls back to this or the plugin. -->
    <!-- 品牌标：S 型折叠尺（矢量优先，老浏览器回退 PNG）。标签标题由页面按当前会话话题动态刷新。 -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%assets/sliderule-mark.svg" />
    <link rel="icon" type="image/png" href="%BASE_URL%sliderule-mark.png" />
    <title>SlideRule · 产品推演引擎</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- 首屏占位：JS 主包下载/执行期间显示品牌 + 加载动画（React 挂载后整体替换）。
         内联样式保证零额外请求；GitHub Pages 弱网下避免长时间白屏。 -->
    <div id="root">
      <style>
        .boot-splash {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 16px;
          background: #f7f8fa;
          color: #334155;
          font-family: "DM Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        .boot-splash__brand {
          font-size: 22px;
          font-weight: 700;
          letter-spacing: 0.02em;
          color: #1d4ed8;
        }
        .boot-splash__spinner {
          width: 28px;
          height: 28px;
          border-radius: 50%;
          border: 3px solid #dbeafe;
          border-top-color: #2563eb;
          animation: boot-splash-spin 0.9s linear infinite;
        }
        .boot-splash__hint {
          font-size: 13px;
          color: #64748b;
        }
        @keyframes boot-splash-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="boot-splash">
        <div class="boot-splash__brand">SlideRule.AI</div>
        <div class="boot-splash__spinner" role="status" aria-label="加载中"></div>
        <div class="boot-splash__hint">正在加载产品推演引擎…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics bootstrap moved to client/src/main.tsx (cleaner index.html for Vite Pages build transforms; avoids html-proxy module resolution issues) -->
  </body>
</html>
